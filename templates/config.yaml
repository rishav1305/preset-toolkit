# preset-toolkit project configuration
# Generated by /preset setup — edit as needed.
version: 1

workspace:
  url: "{{workspace_url}}"
  id: "{{workspace_id}}"

dashboard:
  id: {{dashboard_id}}
  name: "{{dashboard_name}}"
  sync_folder: "sync"

auth:
  # "env" reads PRESET_API_TOKEN/PRESET_API_SECRET from environment
  # "file" reads from .preset-toolkit/.secrets/keys.txt
  method: "env"

screenshots:
  browser: "chromium"
  wait_seconds: 15
  full_page: true
  sections: true
  mask_selectors:
    - ".header-with-actions"
    - ".fave-unfave-icon"

visual_regression:
  threshold: 0.01      # 1% pixel diff tolerance
  baseline_dir: ".preset-toolkit/baselines"

css:
  max_length: 30000    # Stay under Preset's ~33K truncation limit
  push_via_api: true   # Push CSS via REST API (sup sync overwrites CSS)

validation:
  markers_file: ".preset-toolkit/markers.txt"
  smoke_file: ".preset-toolkit/smoke.json"
  fingerprint_file: ".preset-toolkit/.last-push-fingerprint"
  require_markers_before_push: true
  verify_after_push: true

user:
  email: "{{user_email}}"

api:
  # Override these for vanilla Superset or custom deployments
  login_path: "/api/v1/security/login"
  csrf_path: "/api/v1/security/csrf_token/"
  dashboard_path: "/api/v1/dashboard/{id}"
  dashboard_url_pattern: "/superset/dashboard/{id}/"

telemetry:
  enabled: true          # Opt-in: set to false to disable anonymous telemetry
  anonymous_id: ""       # Auto-generated on first run (UUIDv4, NOT your email)
  debug: false           # Set to true for verbose log output
