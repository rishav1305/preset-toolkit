services:
  preset-toolkit:
    build: .
    container_name: preset-toolkit-test
    stdin_open: true
    tty: true
    environment:
      # --- Fill these in to test against a real Preset workspace ---
      - PRESET_API_TOKEN=${PRESET_API_TOKEN:-}
      - PRESET_API_SECRET=${PRESET_API_SECRET:-}
      - POSTHOG_API_KEY=${POSTHOG_API_KEY:-}
      # Claude Code auth (passed from host)
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      # Mount toolkit source for live editing (changes reflect instantly)
      - ./scripts:/toolkit/scripts
      - ./tests:/toolkit/tests
      - ./hooks:/toolkit/hooks
      - ./templates:/toolkit/templates
      # Persist the test workspace across restarts
      - preset-workspace:/workspace
      # Share Claude Code config from host (for auth)
      - ~/.claude:/root/.claude

volumes:
  preset-workspace:
